[env:RAK_4631_rak14000_official_min]
platform = nordicnrf52
framework = arduino
board = rak4631
platform_packages =
  framework-arduinoadafruitnrf52 @ file:///home/emmpunkt/Dokumente/MeshCore/.pio/local-rak-nrf52-1.3.3
board_build.ldscript = boards/nrf52840_s140_v6.ld
board_upload.maximum_size = 815104
